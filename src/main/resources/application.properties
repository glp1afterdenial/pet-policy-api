server.port=8080

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.info.title=ThePointsPup Hotel Pet Policy API
springdoc.info.description=REST API for hotel chain pet policies — data from ThePointsPup.com
springdoc.info.version=1.0.0

# Admin API key for write operations (POST/PUT/PATCH/DELETE)
# Override via environment variable: API_ADMIN_KEY
api.admin-key=${API_ADMIN_KEY:changeme-local-dev}
